      <button id="beta-build-marker" type="button" title="Reload latest build" onclick="(async()=>{try{sessionStorage.clear();if('caches'in window){const keys=await caches.keys();await Promise.all(keys.map((key)=>caches.delete(key)));}if(navigator.serviceWorker){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map((reg)=>reg.unregister()));}}catch(e){}const url=new URL(window.location.href);url.searchParams.set('refresh',String(Date.now()));window.location.replace(url.toString());})()" style="position:fixed;left:60px;top:24px;z-index:99999;font-size:12px;font-weight:700;line-height:1;background:#2563eb;color:#fff;padding:5px 10px;border:0;border-radius:999px;box-shadow:0 2px 8px rgba(0,0,0,.28);cursor:pointer;user-select:none">BETA effca37</button>
