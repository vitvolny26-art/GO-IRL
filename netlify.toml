# Netlify configuration for GO IRL platform
# This is a placeholder for Sprint 0
# Actual frontend deployment will be configured in Sprint 1

[build]
  # No build command for Sprint 0 (frontend coming in Sprint 1)
  command = "echo 'Frontend deployment will be available in Sprint 1'"
  publish = "public"

[context.production]
  command = "echo 'Production deployment configuration - Sprint 1'"

[context.deploy-preview]
  command = "echo 'Deploy preview configuration - Sprint 1'"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
