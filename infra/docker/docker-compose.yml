version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: goirl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: goirl
      POSTGRES_PASSWORD: goirl
      POSTGRES_DB: goirl
    ports:
      - "5432:5432"
    volumes:
      - goirl-postgres-data:/var/lib/postgresql/data

volumes:
  goirl-postgres-data:
