version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: go-irl-postgres
    environment:
      POSTGRES_USER: go_irl_user
      POSTGRES_PASSWORD: go_irl_password
      POSTGRES_DB: go_irl_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - go-irl-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U go_irl_user -d go_irl_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # n8n Workflow Engine
  n8n:
    image: n8nio/n8n:latest
    container_name: go-irl-n8n
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      GENERIC_TIMEZONE: UTC
      DB_TYPE: postgres
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: go_irl_db
      DB_POSTGRESDB_USER: go_irl_user
      DB_POSTGRESDB_PASSWORD: go_irl_password
      N8N_WEBHOOK_TUNNEL_URL: "http://localhost:5678/"
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"
    networks:
      - go-irl-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/api/v1/me"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  n8n_data:
    driver: local

networks:
  go-irl-network:
    driver: bridge
