version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: go-irl-postgres
    environment:
      POSTGRES_USER: go_irl_user
      POSTGRES_PASSWORD: go_irl_password
      POSTGRES_DB: go_irl_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - go-irl-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U go_irl_user -d go_irl_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # n8n Workflow Engine
  n8n:
    image: n8nio/n8n:latest
    container_name: go-irl-n8n
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      GENERIC_TIMEZONE: UTC
      DB_TYPE: postgres
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: go_irl_db
      DB_POSTGRESDB_USER: go_irl_user
      DB_POSTGRESDB_PASSWORD: go_irl_password
      N8N_WEBHOOK_TUNNEL_URL: "http://localhost:5678/"
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"
    networks:
      - go-irl-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/api/v1/me"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # GO IRL Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: go-irl-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: "postgresql://go_irl_user:go_irl_password@postgres:5432/go_irl_db"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET:-}
    ports:
      - "3000:3000"
    networks:
      - go-irl-network
    depends_on:
      postgres:
        condition: service_healthy
      n8n:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/backend/src:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Telegram Mini App Frontend
  telegram-miniapp:
    build:
      context: .
      dockerfile: apps/telegram-miniapp/Dockerfile
    container_name: go-irl-telegram-miniapp
    environment:
      NODE_ENV: production
      VITE_API_BASE_URL: "http://backend:3000"
    ports:
      - "5173:5173"
    networks:
      - go-irl-network
    depends_on:
      - backend
    volumes:
      - ./apps/telegram-miniapp/src:/app/apps/telegram-miniapp/src:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  n8n_data:
    driver: local

networks:
  go-irl-network:
    driver: bridge
